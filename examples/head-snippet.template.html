<link rel="canonical" href="https://{{DOMAIN}}/">
<meta property="og:url" content="https://{{DOMAIN}}/">

<!-- 1. Inline fallback. Обязателен. -->
<script>
  (function () {
    function normalizeHost(host) {
      return String(host || "")
        .toLowerCase()
        .replace(/^www\./, "")
        .trim();
    }

    var currentHost = normalizeHost(location.hostname);
    var allowedHosts = ["{{DOMAIN}}", "www.{{DOMAIN}}"].map(normalizeHost);
    var originalUrl = "https://{{DOMAIN}}/";
    var authorName = "{{AUTHOR_NAME}}";
    var authorPitch = "{{AUTHOR_PITCH}}";
    var authorLink = "{{AUTHOR_LINK}}";
    var authorLinkText = "{{AUTHOR_LINK_TEXT}}";
    var redirectDelay = Number("{{REDIRECT_DELAY}}") || 5000;
    var localHosts = ["localhost", "127.0.0.1", "0.0.0.0"];

    if (localHosts.indexOf(currentHost) !== -1 || allowedHosts.indexOf(currentHost) !== -1) {
      return;
    }

    function renderLockScreen() {
      var delaySeconds = Math.max(1, Math.round(redirectDelay / 1000));

      document.documentElement.innerHTML =
        '<!doctype html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><title>Нелегальная копия сайта</title><style>html,body{margin:0;min-height:100%;background:#070707;color:#fff;font-family:Arial,Helvetica,sans-serif}body{display:flex;align-items:center;justify-content:center;padding:24px}.box{max-width:860px;padding:40px 28px;border:2px solid rgba(255,72,72,.75);border-radius:22px;background:rgba(18,18,18,.96);box-shadow:0 0 60px rgba(255,40,40,.24);text-align:center}.badge{display:inline-block;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:#2a0f0f;color:#ff8c8c;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{margin:0 0 14px;font-size:clamp(30px,6vw,56px);line-height:1.05;color:#ff4b4b}p{margin:10px 0;font-size:clamp(18px,2.6vw,24px);line-height:1.45}.btn{display:inline-block;margin-top:20px;padding:14px 20px;border-radius:14px;background:#ff4b4b;color:#fff;font-weight:700;text-decoration:none}.author{margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.12)}.author-title{margin:0 0 8px;font-size:16px;font-weight:700}.author-text{margin:0;font-size:15px;line-height:1.55;color:#d6d6d6}.author-link{display:inline-flex;align-items:center;justify-content:center;margin-top:14px;padding:12px 16px;border-radius:12px;background:#fff;color:#111;font-size:15px;font-weight:700;text-decoration:none}.timer,.small{margin-top:18px;color:#cfcfcf}.small{font-size:13px;color:#9a9a9a}</style></head><body><div class="box"><div class="badge">Copytrap active</div><h1>Нелегальная копия сайта</h1><p>Этот сайт открыт не на исходном домене и заблокирован автоматически.</p><p>Через <strong>' +
        delaySeconds +
        '</strong> сек. откроется оригинал.</p><a class="btn" href="' +
        originalUrl +
        '">Перейти на оригинальный сайт</a><div class="timer">Редирект через ' +
        delaySeconds +
        ' сек.</div><div class="author"><div class="author-title">Разработчик: ' +
        authorName +
        '</div><p class="author-text">' +
        authorPitch +
        '</p><a class="author-link" href="' +
        authorLink +
        '">' +
        authorLinkText +
        '</a></div><div class="small">current-host: ' +
        currentHost +
        "</div></body>";

      document.documentElement.style.visibility = "visible";

      setTimeout(function () {
        location.replace(originalUrl);
      }, redirectDelay);
    }

    document.documentElement.style.visibility = "hidden";

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", renderLockScreen, { once: true });
    } else {
      renderLockScreen();
    }
  })();
</script>

<!-- 2. Main protection. Тоже обязателен. -->
<script
  src="https://cdn.jsdelivr.net/gh/daviddt369/site-copytrap@main/copytrap.js"
  data-allowed-hosts="{{DOMAIN}},www.{{DOMAIN}}"
  data-original-url="https://{{DOMAIN}}/"
  data-redirect-delay="{{REDIRECT_DELAY}}"
  data-mode="hard"
  data-author-name="{{AUTHOR_NAME}}"
  data-author-pitch="{{AUTHOR_PITCH}}"
  data-author-link="{{AUTHOR_LINK}}"
  data-author-link-text="{{AUTHOR_LINK_TEXT}}"
></script>
